# This file is used to tell bazel that this directory is a uv project.
# It is used by uv_sync to determine python package dependencies.
# We explicitly configure uv to download packages from pypi.org instead of
# relying on Google's internal Airlock proxy (us-python.pkg.dev).
# Airlock requires gcert tokens which expire every ~16 hours, causing
# intermittent "401 Unauthorized" errors when running `uv build`.
# Downloading from pypi.org directly avoids this issue as it does not
# require authentication tokens.
[[index]]
url = "https://pypi.org/simple"
default = true